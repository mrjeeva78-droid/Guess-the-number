<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
</head>
<body>
    <style>

body{
    text-align: center;
    margin-top: 50px;
}

input{
    padding: 10px;
    width: 200px;
    font-size: 18px;
}

button{
    padding: 10px 20px;
    background-color: blue;
    color: white;
    border: none;
    font-size: 18px;
    cursor: pointer;
}

button:hover{
    background-color: darkblue;
}

p{
    font-size: 20px;
    color: green;
}

</style>

    <div>
        <h1>Guess the number</h1>

        <input type="Number" id="number"   required>

        <p id="result"></p>

        <button id="button" onclick="Change()">Check</button>
    </div>

    <script>

          function Change(){

            var input = Number(document.getElementById('number').value);
           

            var para = document.getElementById('result');

            var floors = Math.floor(Math.random() * 10) + 1;
           
           

            if(input === floors){

                para.textContent = "Congrats you are Win";

            }else{

                para.textContent = "Sorry guess one more time";
                
            }

            console.log(floors);
        }

    </script>

</body>
</html>
